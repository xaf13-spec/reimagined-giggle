<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta http-equiv="X-UA-Compatible" content="IE=edge" />
<title>Retro Bowl</title>
<style>
html, body {
  margin:0; padding:0; width:100%; height:100%; overflow:hidden; background:#000;
}
#wrap {
  position:relative; width:100%; height:100%; display:flex; align-items:center; justify-content:center;
}
canvas {
  max-width:100%; max-height:100%; image-rendering: pixelated; image-rendering: crisp-edges;
}
#fsBtn {
  position:fixed; top:12px; right:12px; z-index:99; border:none; padding:10px 14px;
  border-radius:10px; cursor:pointer; font-weight:bold;
}
</style>
</head>
<body>
<button id="fsBtn">Fullscreen</button>
<div id="wrap">
  <canvas id="canvas" width="853" height="480">
    <p>Your browser doesn't support HTML5 canvas.</p>
  </canvas>
</div>
<script src="https://274079163-174037128449362058.preview.editmysite.com/uploads/b/139890129-899796311729593176/files/html5game/RetroBowl.js"></script>
<script>
window.addEventListener('load', function(){
  if (typeof GameMaker_Init === 'function') GameMaker_Init();
});
const btn = document.getElementById('fsBtn');
btn.addEventListener('click', async () => {
  const el = document.documentElement;
  if (!document.fullscreenElement) {
    await el.requestFullscreen().catch(()=>{});
  } else {
    await document.exitFullscreen().catch(()=>{});
  }
});
</script>
</body>
</html>
