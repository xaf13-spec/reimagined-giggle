<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Retro Bowl</title>

<style>
html,body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
    font-family:Arial, sans-serif;
}
#gameWrap{
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
}
canvas{
    max-width:100%;
    max-height:100%;
    image-rendering:pixelated;
}
#fullscreenBtn{
    position:fixed;
    top:12px;
    right:12px;
    z-index:999;
    padding:10px 16px;
    border:none;
    border-radius:10px;
    font-weight:bold;
    cursor:pointer;
}
#loading{
    color:white;
    position:fixed;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
}
</style>
</head>

<body>

<button id="fullscreenBtn">Fullscreen</button>
<div id="loading">Loading Game...</div>

<div id="gameWrap">
<canvas id="canvas" width="853" height="480">
Your browser doesn't support HTML5 canvas.
</canvas>
</div>

<script>
document.getElementById("fullscreenBtn").onclick = async function () {
    if (!document.fullscreenElement) {
        await document.documentElement.requestFullscreen().catch(()=>{});
    } else {
        await document.exitFullscreen().catch(()=>{});
    }
};
</script>

<!-- GAME FILE -->
<script src="RetroBowl.js"></script>

<script>
window.onload = function () {
    document.getElementById("loading").style.display = "none";

    if (typeof GameMaker_Init === "function") {
        GameMaker_Init();
    } else {
        document.getElementById("loading").style.display = "block";
        document.getElementById("loading").innerText =
            "RetroBowl.js missing. Upload it beside index.html";
    }
};
</script>

</body>
</html>
